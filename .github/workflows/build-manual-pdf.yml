name: Build Manual PDF

on:
  push:
    paths:
      - "manual/**"
      - ".github/workflows/build-manual-pdf.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-dejavu-core weasyprint python3
          fc-cache -fv

      - name: Build HTML + PDF
        working-directory: manual
        run: |
          python3 build_manual.py
          weasyprint manual.html TypixNode_Manual.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: TypixNode-Manual-PDF
          path: manual/TypixNode_Manual.pdf

      - name: Commit PDF to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f manual/TypixNode_Manual.pdf
          git diff --cached --quiet || git commit -m "docs: auto-generate redesigned Manual PDF [skip ci]"
          git push
